<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HR Digital Portal</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; -webkit-tap-highlight-color: transparent; }
        .active-tab { color: #2563eb !important; }
        .active-tab i { transform: translateY(-4px); color: #2563eb; }
        .page-transition { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <header class="bg-blue-600 p-6 rounded-b-[40px] shadow-lg mb-6">
        <div class="flex items-center space-x-4 text-white">
            <div class="relative w-16 h-16 rounded-full border-4 border-white overflow-hidden bg-white shadow-sm">
                <img id="lineProfileImg" class="w-full h-full object-cover hidden">
                <div id="defaultIcon" class="w-full h-full flex items-center justify-center bg-blue-100 text-blue-400">
                    <i class="fas fa-user-tie text-2xl"></i>
                </div>
            </div>
            <div>
                <h1 id="empNameHeader" class="text-lg font-bold leading-tight">กำลังโหลดข้อมูล...</h1>
                <p id="lineName" class="text-blue-100 text-[10px] opacity-80 italic"></p>
            </div>
        </div>
    </header>

    <main class="px-4 max-w-md mx-auto">
        <section id="page-profile" class="page-transition">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-5 space-y-3">
                <h3 class="font-bold text-slate-800 border-b pb-2 mb-4">ประวัติบุคลากร</h3>
                <div id="profileContent" class="space-y-2 text-sm text-slate-700"></div>
            </div>
        </section>

        <section id="page-salary" class="page-transition hidden">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-5">
                <h3 class="font-bold text-slate-800 mb-4">รายละเอียดเงินเดือน</h3>
                
                <div class="mb-4">
                    <label class="text-[10px] text-slate-400 block mb-1">เลือกงวดประจำเดือน:</label>
                    <select id="monthSelect" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none" onchange="renderSalaryDetails()"></select>
                </div>

                <div id="salaryItems" class="space-y-2 mb-6">
                    </div>

                <div class="space-y-2 mb-4">
                    <div class="flex justify-between p-3 bg-emerald-50 rounded-xl text-xs">
                        <span class="text-slate-500">รายรับรวม</span>
                        <span id="totalIncome" class="font-bold text-emerald-700">0.00</span>
                    </div>
                    <div class="flex justify-between p-3 bg-rose-50 rounded-xl text-xs">
                        <span class="text-slate-500">รายการหักรวม</span>
                        <span id="totalDeduction" class="font-bold text-rose-700">0.00</span>
                    </div>
                </div>

                <div class="bg-blue-600 p-6 rounded-[30px] text-center shadow-xl shadow-blue-100">
                    <p class="text-blue-100 text-[10px] uppercase tracking-widest mb-1">รายรับสุทธิ (Net)</p>
                    <h2 id="netSalary" class="text-3xl font-black text-white">0.00</h2>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-4 right-4 bg-white/90 backdrop-blur-lg h-20 rounded-[30px] shadow-2xl border border-white/20 flex items-center justify-around px-6 z-50">
        <button onclick="switchTab('profile')" id="btn-profile" class="flex flex-col items-center space-y-1 text-slate-400 active-tab">
            <i class="fas fa-id-card text-xl"></i>
            <span class="text-[9px] font-bold uppercase">โปรไฟล์</span>
        </button>
        <div class="w-[1px] h-8 bg-slate-100"></div>
        <button onclick="switchTab('salary')" id="btn-salary" class="flex flex-col items-center space-y-1 text-slate-400">
            <i class="fas fa-wallet text-xl"></i>
            <span class="text-[9px] font-bold uppercase">เงินเดือน</span>
        </button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx1GUmuTWCqA6yMJHY_ygdotjPBIOah-lFT9AI-RgkxSRpGqhDgTmKJcC9spo6_bxxV6Q/exec";
        const LIFF_ID = "2010314411-PgXLiLAk";
        let employeeData = [];

        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                document.getElementById('lineName').innerText = "@" + profile.displayName;
                if (profile.pictureUrl) {
                    const img = document.getElementById('lineProfileImg');
                    img.src = profile.pictureUrl;
                    img.classList.remove('hidden');
                    document.getElementById('defaultIcon').classList.add('hidden');
                }
                fetchData(profile.userId);
            } catch (err) { console.error(err); }
        }

        async function fetchData(userId) {
            const res = await fetch(`${API_URL}?userId=${userId}`);
            const result = await res.json();
            if (result.status === "success") {
                employeeData = result.data;
                renderProfile();
                populateMonths();
                renderSalaryDetails();
            } else { alert("ไม่พบข้อมูล"); }
        }

        function renderProfile() {
            const d = employeeData[0];
            document.getElementById('empNameHeader').innerText = d["ชื่อ-นามสกุล"];
            const fields = [
                { label: "เลขบัตรประชาชน", key: "เลขบัตรประชาชน" },
                { label: "ตำแหน่ง", key: "ตำแหน่ง" },
                { label: "ระดับ", key: "ระดับ" },
                { label: "สังกัด", key: "สังกัด" },
                { label: "อายุราชการ", key: "อายุราชการ" },
                { label: "วันเกษียณ", key: "วันเกษียณอายุ" }
            ];
            document.getElementById('profileContent').innerHTML = fields.map(f => `
                <div class="flex justify-between border-b border-slate-50 pb-2">
                    <span class="text-slate-400 font-light text-[11px]">${f.label}</span>
                    <span class="font-semibold text-right">${d[f.key] || '-'}</span>
                </div>
            `).join('');
        }

        function populateMonths() {
            const select = document.getElementById('monthSelect');
            select.innerHTML = employeeData.map((d, i) => `<option value="${i}">${d["เดือน"]}</option>`).join('');
        }

        function renderSalaryDetails() {
            const i = document.getElementById('monthSelect').value;
            const d = employeeData[i];
            
            const incomeFields = [
                "เงินเดือนหลัก", "เงินค่าตอบแทน", "เงินเพิ่มค่าครองชีพชั่วคราว", 
                "เงินประจำตำแหน่ง", "เงินวิทยฐานะ", "ค่าตอบแทนนอกเหนือจากเงินเดือน", "เงินค่าตอบแทนเสี่ยงภัย"
            ];
            
            const incomeList = incomeFields.map(f => `
                <div class="flex justify-between items-center text-xs border-b border-slate-50 py-1">
                    <span class="text-slate-400">${f}</span>
                    <span class="text-slate-700">${Number(d[f] || 0).toLocaleString('th-TH', {minimumFractionDigits: 2})}</span>
                </div>
            `).join('');
            
            document.getElementById('salaryItems').innerHTML = incomeList;
            
            const totalIn = incomeFields.reduce((sum, f) => sum + Number(d[f] || 0), 0);
            const totalDe = Number(d["ประกันสังคม"] || 0) + Number(d["ภาษี"] || 0);
            
            document.getElementById('totalIncome').innerText = totalIn.toLocaleString('th-TH', {minimumFractionDigits: 2});
            document.getElementById('totalDeduction').innerText = "-" + totalDe.toLocaleString('th-TH', {minimumFractionDigits: 2});
            document.getElementById('netSalary').innerText = Number(d["รายรับสุทธิ"] || 0).toLocaleString('th-TH', {minimumFractionDigits: 2}) + " ฿";
        }

        function switchTab(tab) {
            document.getElementById('page-profile').classList.toggle('hidden', tab !== 'profile');
            document.getElementById('page-salary').classList.toggle('hidden', tab !== 'salary');
            document.getElementById('btn-profile').classList.toggle('active-tab', tab === 'profile');
            document.getElementById('btn-salary').classList.toggle('active-tab', tab === 'salary');
        }

        initLiff();
    </script>
</body>
</html>

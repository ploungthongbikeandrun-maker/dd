<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test LIFF</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h1>Testing LIFF SDK</h1>
  <div id="status">Loading...</div>
  <script>
    console.log('LIFF object:', typeof liff);
    if (typeof liff !== 'undefined') {
      document.getElementById('status').innerHTML = '✅ LIFF SDK loaded successfully!';
    } else {
      document.getElementById('status').innerHTML = '❌ LIFF SDK failed to load';
    }
  </script>
</body>
</html>

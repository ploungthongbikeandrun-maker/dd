<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คเงินเดือนพนักงาน</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6 mt-6">
        <h2 class="text-2xl font-bold text-center text-green-600 mb-4">สลิปเงินเดือนออนไลน์</h2>
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">เลือกเดือนที่ต้องการตรวจสอบ:</label>
            <select id="monthSelect" class="w-full p-2 border border-gray-300 rounded-lg" onchange="fetchSalary()">
                <option value="มกราคม 2026">มกราคม 2026</option>
                <option value="กุมภาพันธ์ 2026">กุมภาพันธ์ 2026</option>
                <option value="มีนาคม 2026">มีนาคม 2026</option>
            </select>
        </div>

        <hr class="my-4 border-gray-200">

        <div id="salaryCard" class="hidden">
            <p class="text-gray-600"><strong>ชื่อ-นามสกุล:</strong> <span id="empName"></span></p>
            <p class="text-gray-600 mb-4"><strong>รหัสพนักงาน:</strong> <span id="empId"></span></p>
            
            <div class="bg-green-50 p-3 rounded-lg mb-2">
                <span class="text-gray-700 font-semibold">รายรับรวม:</span>
                <div class="flex justify-between text-sm text-gray-600 mt-1">
                    <span>เงินเดือนหลัก:</span> <span id="mainSalary">0</span>
                </div>
                <div class="flex justify-between text-sm text-gray-600">
                    <span>ค่าตำแหน่ง/OT:</span> <span id="allowance">0</span>
                </div>
            </div>

            <div class="bg-red-50 p-3 rounded-lg mb-4">
                <span class="text-gray-700 font-semibold">รายจ่าย/หัก:</span>
                <div class="flex justify-between text-sm text-gray-600 mt-1">
                    <span>ประกันสังคม:</span> <span id="sso">0</span>
                </div>
                <div class="flex justify-between text-sm text-gray-600">
                    <span>ภาษีหัก ณ ที่จ่าย:</span> <span id="tax">0</span>
                </div>
            </div>

            <div class="border-t-2 border-dashed pt-3 flex justify-between items-center">
                <span class="text-lg font-bold text-gray-800">รายรับสุทธิ:</span>
                <span class="text-2xl font-bold text-green-600" id="netSalary">0 บาท</span>
            </div>
        </div>

        <div id="statusMessage" class="text-center text-gray-500 my-4">กำลังโหลดข้อมูลโปรไฟล์ LINE...</div>
    </div>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx1GUmuTWCqA6yMJHY_ygdotjPBIOah-lFT9AI-RgkxSRpGqhDgTmKJcC9spo6_bxxV6Q/exec";
        let lineUserId = "";

        async function initLiff() {
            try {
                // ใส่ LIFF ID ที่ได้จาก LINE Developers Console
                await liff.init({ liffId: "2010314411-PgXLiLAk" }); 
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    lineUserId = profile.userId;
                    document.getElementById("statusMessage").innerText = "เลือกเดือนเพื่อดูข้อมูลสลิป";
                    fetchSalary(); // เรียกดูเดือนแรกที่ตั้งค่าไว้ทันที
                } else {
                    liff.login();
                }
            } catch (error) {
                console.error("LIFF Initialization failed", error);
                document.getElementById("statusMessage").innerText = "เกิดข้อผิดพลาดในการโหลดระบบ LINE";
            }
        }

        async function fetchSalary() {
            if (!lineUserId) return;
            
            const selectedMonth = document.getElementById("monthSelect").value;
            document.getElementById("statusMessage").innerText = "กำลังดึงข้อมูลเงินเดือน...";
            document.getElementById("salaryCard").classList.add("hidden");

            try {
                const response = await fetch(`${GAS_API_URL}?userId=${lineUserId}&month=${selectedMonth}`);
                const result = await response.json();

                if (result.status === "success") {
                    document.getElementById("statusMessage").innerText = "";
                    document.getElementById("salaryCard").classList.remove("hidden");
                    
                    // นำข้อมูลไปใส่ใน HTML Element
                    document.getElementById("empName").innerText = result.data["ชื่อ-นามสกุล"];
                    document.getElementById("empId").innerText = result.data["รหัสพนักงาน"];
                    document.getElementById("mainSalary").innerText = Number(result.data["เงินเดือนหลัก"]).toLocaleString() + " บาท";
                    document.getElementById("allowance").innerText = Number(result.data["ค่าตำแหน่ง"] + result.data["OT"]).toLocaleString() + " บาท";
                    document.getElementById("sso").innerText = "-" + Number(result.data["ประกันสังคม"]).toLocaleString() + " บาท";
                    document.getElementById("tax").innerText = "-" + Number(result.data["ภาษี"]).toLocaleString() + " บาท";
                    document.getElementById("netSalary").innerText = Number(result.data["รายรับสุทธิ"]).toLocaleString() + " บาท";
                } else {
                    document.getElementById("statusMessage").innerText = result.message;
                }
            } catch (error) {
                document.getElementById("statusMessage").innerText = "ไม่สามารถเชื่อมต่อฐานข้อมูลได้";
            }
        }

        // เริ่มทำงานเมื่อเปิดหน้าเว็บ
        initLiff();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LINE LIFF TO GAS</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="text-align: center; padding-top: 50px; font-family: sans-serif;">

    <div id="status">กำลังเชื่อมต่อ LINE LIFF...</div>
    <img id="userImg" style="width:100px; border-radius:50%; display:none; margin: 20px auto;">
    <h3 id="userName"></h3>

    <script>
        // 1. ใส่ข้อมูลของคุณตรงนี้
        const LIFF_ID = "ใส่_LIFF_ID_ของคุณ"; 
        const GAS_WEBAPP_URL = "ใส่_ลิงก์_EXEC_ของ_APPS_SCRIPT_ที่ได้จากสเต็ปที่1";

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    // ดึงโปรไฟล์สำเร็จ (เพราะไม่ได้อยู่ใน iFrame ของ Google แล้ว)
                    const profile = await liff.getProfile();
                    
                    // แสดงผลบนหน้าจอตัวเองก่อน
                    document.getElementById("status").innerText = "โหลดโปรไฟล์สำเร็จ! กำลังส่งข้อมูลไป Google Sheets...";
                    document.getElementById("userName").innerText = "สวัสดีคุณ " + profile.displayName;
                    document.getElementById("userImg").src = profile.pictureUrl;
                    document.getElementById("userImg").style.display = "block";

                    // 2. พลิกแพลงตรงนี้: ยิงข้อมูลโปรไฟล์กลับไปให้ Google Apps Script ทำงานต่อ
                    await fetch(GAS_WEBAPP_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            userId: profile.userId,
                            name: profile.displayName,
                            picture: profile.pictureUrl
                        })
                    });
                    
                    document.getElementById("status").innerText = "บันทึกข้อมูลเรียบร้อยแล้ว!";
                }
            } catch (error) {
                document.getElementById("status").innerText = "เกิดข้อผิดพลาด: " + error.message;
            }
        }
        initLIFF();
    </script>
</body>
</html>

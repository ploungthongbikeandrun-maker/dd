<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ระบบขอลางาน</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    
    .card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    
    h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    
    label .required {
      color: #e74c3c;
      margin-left: 4px;
    }
    
    select, input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s ease;
      background: white;
    }
    
    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    
    .btn-submit:disabled {
      opacity: 0.6;
      transform: none;
      cursor: not-allowed;
    }
    
    .status-card {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 12px;
      border-left: 4px solid #667eea;
    }
    
    .status-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .status-title {
      font-weight: 600;
      color: #333;
    }
    
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .status-pending { 
      background: #fff3cd; 
      color: #856404; 
    }
    .status-approved { 
      background: #d4edda; 
      color: #155724; 
    }
    .status-rejected { 
      background: #f8d7da; 
      color: #721c24; 
    }
    
    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 15px;
      font-size: 14px;
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from {
        transform: translateY(100px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .alert-info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    
    .nav-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }
    
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      background: #f0f0f0;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      color: #666;
    }
    
    .tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    
    .leave-date {
      font-size: 13px;
      color: #888;
      margin: 8px 0;
    }
    
    .leave-reason {
      font-size: 13px;
      color: #555;
      background: #f0f0f0;
      padding: 8px;
      border-radius: 8px;
      margin-top: 8px;
    }
    
    .profile-info {
      background: #f0f0f0;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #555;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>
        <span>🏖️</span> 
        <span>ระบบขอลางาน</span>
      </h1>
      <div class="subtitle">กรุณากรอกข้อมูลให้ครบถ้วน</div>
      
      <div id="profileInfo" class="profile-info" style="display: none;">
        👤 กำลังโหลดข้อมูล...
      </div>
      
      <div class="nav-tabs">
        <button class="tab active" onclick="showTab('request')">✏️ ขอลางาน</button>
        <button class="tab" onclick="showTab('history')">📋 ประวัติการลา</button>
      </div>
      
      <div id="requestTab">
        <form id="leaveForm">
          <div class="form-group">
            <label>ประเภทการลา <span class="required">*</span></label>
            <select id="leaveType" required>
              <option value="">-- เลือกประเภท --</option>
              <option value="ลาป่วย">🤒 ลาป่วย</option>
              <option value="ลากิจ">🏠 ลากิจ</option>
              <option value="ลาพักผ่อน">✈️ ลาพักผ่อน</option>
              <option value="ลาคลอด">👶 ลาคลอด</option>
              <option value="ลาอุปสมบท">🙏 ลาอุปสมบท</option>
              <option value="ลาตรวจสุขภาพ">🏥 ลาตรวจสุขภาพ</option>
              <option value="อื่นๆ">📝 อื่นๆ</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>วันที่เริ่มต้น <span class="required">*</span></label>
            <input type="date" id="startDate" required>
          </div>
          
          <div class="form-group">
            <label>วันที่สิ้นสุด <span class="required">*</span></label>
            <input type="date" id="endDate" required>
          </div>
          
          <div class="form-group">
            <label>เหตุผล <span class="required">*</span></label>
            <textarea id="reason" placeholder="ระบุเหตุผลการลา..." required></textarea>
          </div>
          
          <button type="submit" class="btn-submit" id="submitBtn">
            📤 ส่งคำขอลางาน
          </button>
        </form>
      </div>
      
      <div id="historyTab" style="display: none;">
        <div id="historyList"></div>
      </div>
      
      <div id="alertContainer"></div>
    </div>
  </div>
  
  <script>
    // กำหนด LIFF ID (ต้องเปลี่ยนเป็นของตัวเอง)
    const LIFF_ID = '2010314411-PgXLiLAk'; // 🔴 แก้ไขตรงนี้!
    
    let liffObject = null;
    let currentUserId = '';
    let currentDisplayName = '';
    let isInitialized = false;
    
    // แสดง Alert
    function showAlert(message, type) {
      const alertContainer = document.getElementById('alertContainer');
      const alertId = 'alert_' + Date.now();
      
      const alertDiv = document.createElement('div');
      alertDiv.id = alertId;
      alertDiv.className = `alert alert-${type}`;
      alertDiv.innerHTML = message;
      
      alertContainer.appendChild(alertDiv);
      
      setTimeout(() => {
        const element = document.getElementById(alertId);
        if (element) {
          element.style.opacity = '0';
          setTimeout(() => {
            if (element.parentNode) {
              element.parentNode.removeChild(element);
            }
          }, 300);
        }
      }, 3000);
    }
    
    // แสดง/ซ่อน Tab
    function showTab(tabName) {
      const requestTab = document.getElementById('requestTab');
      const historyTab = document.getElementById('historyTab');
      const tabs = document.querySelectorAll('.tab');
      
      if (tabName === 'request') {
        requestTab.style.display = 'block';
        historyTab.style.display = 'none';
        tabs[0].classList.add('active');
        tabs[1].classList.remove('active');
      } else {
        requestTab.style.display = 'none';
        historyTab.style.display = 'block';
        tabs[0].classList.remove('active');
        tabs[1].classList.add('active');
        loadLeaveHistory();
      }
    }
    
    // โหลดประวัติการลา
    async function loadLeaveHistory() {
      const historyDiv = document.getElementById('historyList');
      
      if (!currentUserId) {
        historyDiv.innerHTML = '<div class="empty-state">⚠️ กรุณารอสักครู่ กำลังโหลดข้อมูล...</div>';
        return;
      }
      
      historyDiv.innerHTML = '<div class="loading">⏳ กำลังโหลด...</div>';
      
      try {
        // ใช้ callback pattern แทน Promise
        google.script.run
          .withSuccessHandler(function(leaves) {
            if (!leaves || leaves.length === 0) {
              historyDiv.innerHTML = '<div class="empty-state">📭 ยังไม่มีประวัติการลางาน</div>';
              return;
            }
            
            historyDiv.innerHTML = '';
            leaves.forEach(leave => {
              const statusClass = `status-${leave.status}`;
              const statusThai = {
                'pending': 'รออนุมัติ',
                'approved': 'อนุมัติแล้ว',
                'rejected': 'ไม่อนุมัติ'
              }[leave.status] || leave.status;
              
              const statusIcon = leave.status === 'approved' ? '✅' : 
                                leave.status === 'rejected' ? '❌' : '⏳';
              
              historyDiv.innerHTML += `
                <div class="status-card">
                  <div class="status-header">
                    <span class="status-title">${statusIcon} ${escapeHtml(leave.leaveType)}</span>
                    <span class="status-badge ${statusClass}">${statusThai}</span>
                  </div>
                  <div class="leave-date">📅 ${escapeHtml(leave.startDate)} → ${escapeHtml(leave.endDate)}</div>
                  ${leave.reason ? `<div class="leave-reason">💬 ${escapeHtml(leave.reason)}</div>` : ''}
                </div>
              `;
            });
          })
          .withFailureHandler(function(error) {
            console.error('Load history error:', error);
            historyDiv.innerHTML = '<div class="empty-state">⚠️ โหลดข้อมูลไม่สำเร็จ: ' + error.message + '</div>';
          })
          .getMyLeaves(currentUserId);
          
      } catch (error) {
        console.error('Load history error:', error);
        historyDiv.innerHTML = '<div class="empty-state">⚠️ โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่</div>';
      }
    }
    
    // ป้องกัน XSS
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // ฟังก์ชันสำหรับ Google Apps Script callback
    window.handleRegisterResult = function(result) {
      if (result && result.success) {
        console.log('User registered successfully');
      } else if (result && result.error) {
        console.error('Register error:', result.error);
      }
    };
    
    // ฟังก์ชันหลักสำหรับ LIFF
    async function initializeLIFF() {
      try {
        // ตรวจสอบ LIFF ID
        if (LIFF_ID === '2010314411-PgXLiLAk') {
          document.getElementById('profileInfo').innerHTML = 
            '⚠️ <strong>กรุณาตั้งค่า LIFF_ID</strong><br>แก้ไข LIFF_ID ในโค้ด HTML ให้ถูกต้อง';
          document.getElementById('profileInfo').style.display = 'block';
          return;
        }
        
        console.log('Initializing LIFF...');
        await liff.init({ liffId: LIFF_ID });
        console.log('LIFF initialized');
        
        // ตรวจสอบการ Login
        if (!liff.isLoggedIn()) {
          console.log('User not logged in, redirecting to login...');
          liff.login();
          return;
        }
        
        // ดึงข้อมูลโปรไฟล์
        const profile = await liff.getProfile();
        currentUserId = profile.userId;
        currentDisplayName = profile.displayName;
        
        console.log('User profile loaded:', currentDisplayName);
        
        // แสดงข้อมูลโปรไฟล์
        document.getElementById('profileInfo').innerHTML = 
          `👤 <strong>${escapeHtml(currentDisplayName)}</strong><br>📱 พร้อมใช้งานแล้ว`;
        document.getElementById('profileInfo').style.display = 'block';
        
        isInitialized = true;
        
        // ลงทะเบียนผู้ใช้ (ใช้ callback pattern)
        google.script.run
          .withSuccessHandler(function(result) {
            if (result && result.success) {
              console.log('User registered successfully');
            } else if (result && result.error) {
              console.error('Register error:', result.error);
            }
          })
          .withFailureHandler(function(error) {
            console.error('Register failed:', error);
          })
          .registerUser(currentUserId, currentDisplayName);
          
      } catch (error) {
        console.error('LIFF initialization failed:', error);
        document.getElementById('profileInfo').innerHTML = 
          '⚠️ ไม่สามารถเชื่อมต่อ LINE ได้: ' + error.message;
        document.getElementById('profileInfo').style.display = 'block';
        showAlert('เกิดข้อผิดพลาด: ' + error.message, 'error');
      }
    }
    
    // ส่งคำขอลางาน
    document.getElementById('leaveForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // ตรวจสอบการ initialize
      if (!isInitialized || !currentUserId) {
        showAlert('กรุณารอสักครู่ กำลังโหลดข้อมูลผู้ใช้...', 'info');
        return;
      }
      
      const leaveType = document.getElementById('leaveType').value;
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const reason = document.getElementById('reason').value.trim();
      
      // ตรวจสอบข้อมูล
      if (!leaveType || !startDate || !endDate || !reason) {
        showAlert('กรุณากรอกข้อมูลให้ครบทุกช่อง', 'error');
        return;
      }
      
      const start = new Date(startDate);
      const end = new Date(endDate);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      if (start > end) {
        showAlert('วันที่สิ้นสุดต้องไม่น้อยกว่าวันที่เริ่มต้น', 'error');
        return;
      }
      
      if (start < today) {
        showAlert('ไม่สามารถขอลาย้อนหลังได้', 'error');
        return;
      }
      
      const leaveData = {
        userId: currentUserId,
        displayName: currentDisplayName,
        leaveType: leaveType,
        startDate: startDate,
        endDate: endDate,
        reason: reason
      };
      
      const submitBtn = document.getElementById('submitBtn');
      const originalText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> กำลังส่ง...';
      
      // ใช้ callback pattern แทน Promise
      google.script.run
        .withSuccessHandler(function(result) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
          
          if (result && result.success) {
            showAlert('✅ ' + result.message, 'success');
            document.getElementById('leaveForm').reset();
          } else if (result && result.error) {
            showAlert('❌ ' + result.error, 'error');
          } else {
            showAlert('❌ เกิดข้อผิดพลาด: ไม่ได้รับข้อมูลตอบกลับ', 'error');
          }
        })
        .withFailureHandler(function(error) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
          console.error('Submit error:', error);
          showAlert('❌ เกิดข้อผิดพลาด: ' + (error.message || 'ส่งข้อมูลไม่สำเร็จ'), 'error');
        })
        .submitLeave(leaveData);
    });
    
    // กำหนดฟังก์ชัน global ให้กับ showTab
    window.showTab = showTab;
    
    // โหลด LIFF SDK และเริ่มต้น
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() {
        if (typeof liff !== 'undefined') {
          initializeLIFF();
        } else {
          console.error('LIFF SDK not loaded');
          const checkLiff = setInterval(function() {
            if (typeof liff !== 'undefined') {
              clearInterval(checkLiff);
              initializeLIFF();
            }
          }, 500);
          
          setTimeout(function() {
            clearInterval(checkLiff);
            if (typeof liff === 'undefined') {
              document.getElementById('profileInfo').innerHTML = 
                '⚠️ ไม่สามารถโหลด LINE SDK ได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต';
              document.getElementById('profileInfo').style.display = 'block';
            }
          }, 10000);
        }
      });
    } else {
      if (typeof liff !== 'undefined') {
        initializeLIFF();
      } else {
        const checkLiff = setInterval(function() {
          if (typeof liff !== 'undefined') {
            clearInterval(checkLiff);
            initializeLIFF();
          }
        }, 500);
        
        setTimeout(function() {
          clearInterval(checkLiff);
          if (typeof liff === 'undefined') {
            document.getElementById('profileInfo').innerHTML = 
              '⚠️ ไม่สามารถโหลด LINE SDK ได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต';
            document.getElementById('profileInfo').style.display = 'block';
          }
        }, 10000);
      }
    }
  </script>
</body>
</html>
